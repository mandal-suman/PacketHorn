# PacketHorn Configuration
# All major runtime settings are controlled here.

capture.interface=AUTO
capture.promiscuous=true
capture.read_timeout_ms=1000
capture.filter=
capture.buffer_queue_size=2000

detection.mode=AlertOnly

firewall.block_duration_sec=15

ui.use_tui=true
ui.packet_list_limit=100
ui.detection_list_limit=100

paths.rules_dir=rules
paths.logs_dir=logs
paths.pcap_dir=outputs/pcap
paths.reports_dir=outputs/reports
