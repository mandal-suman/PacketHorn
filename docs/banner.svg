<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6fc4"/>
      <stop offset="100%" stop-color="#3b9eff"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#3b9eff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b9eff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect x="0" y="0" width="420" height="160" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="420" height="160" rx="10" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#clip)" opacity="0.07" stroke="#3b9eff" stroke-width="0.5">
    <line x1="0" y1="32" x2="420" y2="32"/>
    <line x1="0" y1="64" x2="420" y2="64"/>
    <line x1="0" y1="96" x2="420" y2="96"/>
    <line x1="0" y1="128" x2="420" y2="128"/>
    <line x1="60" y1="0" x2="60" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="160"/>
  </g>

  <!-- Packet wave lines emanating right of horn (signal output) -->
  <g filter="url(#glow)" opacity="0.55" stroke="#3b9eff" stroke-width="1" fill="none">
    <path d="M 168 60 Q 185 80 168 100" stroke-width="1.5" opacity="0.9"/>
    <path d="M 178 50 Q 205 80 178 110" opacity="0.7"/>
    <path d="M 188 42 Q 222 80 188 118" opacity="0.45"/>
    <path d="M 198 35 Q 238 80 198 125" opacity="0.25"/>
  </g>

  <!-- Horn body — funnel shape pointing right -->
  <!-- Wide mouth on left, narrow bell on right -->
  <g filter="url(#softglow)">
    <!-- Main horn fill -->
    <path d="M 38 34 L 38 126 L 100 98 L 100 62 Z"
          fill="url(#hornGrad)" opacity="0.15"/>
    <!-- Horn outline -->
    <path d="M 38 34 L 38 126 L 100 98 L 100 62 Z"
          fill="none" stroke="#3b9eff" stroke-width="1.5" opacity="0.9"/>
    <!-- Horn bell (narrow right end connecting to tube) -->
    <rect x="100" y="70" width="62" height="20" rx="2"
          fill="url(#hornGrad)" opacity="0.18"/>
    <rect x="100" y="70" width="62" height="20" rx="2"
          fill="none" stroke="#3b9eff" stroke-width="1.5" opacity="0.9"/>
    <!-- Bell end cap / aperture -->
    <line x1="162" y1="68" x2="162" y2="92"
          stroke="#3b9eff" stroke-width="2.5" opacity="1"/>
  </g>

  <!-- Scan lines inside horn for texture -->
  <g clip-path="url(#clip)" opacity="0.25" stroke="#3b9eff" stroke-width="0.5">
    <line x1="38" y1="53" x2="100" y2="72"/>
    <line x1="38" y1="70" x2="100" y2="77"/>
    <line x1="38" y1="90" x2="100" y2="83"/>
    <line x1="38" y1="107" x2="100" y2="88"/>
  </g>

  <!-- Crosshair target circle on horn mouth -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="38" cy="80" r="12" fill="none" stroke="#3b9eff" stroke-width="1"/>
    <line x1="26" y1="80" x2="50" y2="80" stroke="#3b9eff" stroke-width="0.75"/>
    <line x1="38" y1="68" x2="38" y2="92" stroke="#3b9eff" stroke-width="0.75"/>
    <circle cx="38" cy="80" r="3" fill="#3b9eff" opacity="0.9"/>
  </g>

  <!-- Packet indicators — small traveling squares on the tube -->
  <g filter="url(#glow)">
    <rect x="108" y="74" width="8" height="8" rx="1" fill="#3b9eff" opacity="0.9"/>
    <rect x="122" y="74" width="8" height="8" rx="1" fill="#3b9eff" opacity="0.6"/>
    <rect x="136" y="74" width="8" height="8" rx="1" fill="#3b9eff" opacity="0.35"/>
    <rect x="150" y="74" width="8" height="8" rx="1" fill="#3b9eff" opacity="0.15"/>
  </g>

  <!-- PACKETHORN wordmark -->
  <text x="210" y="75"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="32"
        font-weight="700"
        letter-spacing="3"
        fill="#e8f4ff"
        filter="url(#glow)">PACKET</text>
  <text x="210" y="108"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="32"
        font-weight="700"
        letter-spacing="3"
        fill="#3b9eff"
        filter="url(#glow)">HORN</text>

  <!-- Tagline -->
  <text x="211" y="128"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="10"
        letter-spacing="2.5"
        fill="#5a8abf"
        opacity="0.85">WINDOWS  ·  NIDR  ·  v1.0.0</text>

  <!-- Corner bracket decorations — top left -->
  <g stroke="#3b9eff" stroke-width="1.2" fill="none" opacity="0.5">
    <polyline points="8,20 8,8 20,8"/>
    <polyline points="400,8 412,8 412,20"/>
    <polyline points="8,140 8,152 20,152"/>
    <polyline points="400,152 412,152 412,140"/>
  </g>

  <!-- Thin accent line under tagline -->
  <rect x="210" y="134" width="175" height="1" fill="url(#glowLine)" opacity="0.5"/>
</svg>