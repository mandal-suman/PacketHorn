  - name: FTP_WRITE_ACCESS
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@internal"
    dst_port: "21"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: DST_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Initial Access
    mitre_technique: T1021.003
    tags: ftp, legacy, insecure_protocol
    severity: HIGH
    confidence: HIGH
    action: ALERT
    description: >
      Inbound connection to FTP port (21) from an external IP address. 
      FTP is an insecure protocol and its use should be investigated immediately.

  - name: RDP_TO_WORKSTATION
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@workstations"
    dst_port: "3389"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: DST_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Initial Access
    mitre_technique: T1133
    tags: rdp, brute_force, external_access
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      Inbound RDP connection to a workstation. Workstations should not have direct
      external RDP access. This is a common attack vector for lateral movement.
      
  - name: RDP_ANOMALY_MULTI_PORT
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@internal"
    dst_port: "3389,5985,5986"  # RDP, WinRM HTTP/S
    window_sec: 60
    threshold: 3
    metric: UNIQUE_PORTS
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Privilege Escalation
    mitre_technique: T1078
    tags: rdp, remote_execution, persistence
    severity: HIGH
    confidence: HIGH
    action: ALERT
    description: >
      Multiple distinct ports (RDP, WinRM) contacted from the same external source
      to internal hosts within 60 seconds. Likely indicates an attacker attempting
      to gain initial access and execute commands.

  - name: SMB_TO_INTERNET
    version: 1
    protocol: TCP
    direction: OUTBOUND
    src_ip: "@internal"
    dst_ip: "@external"
    dst_port: "445"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Lateral Movement
    mitre_technique: T1021.002
    tags: smb, lateral_movement, windows
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      Internal host communicating with SMB port (445) on an external IP address. 
      SMB should never be exposed to the internet.