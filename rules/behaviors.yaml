behaviors:
  - name: PORT_SCAN_SLOW
    version: 1
    protocol: TCP
    direction: OUTBOUND
    src_ip: "*"
    dst_ip: "@external"
    dst_port: "1:1024"
    window_sec: 60
    threshold: 30
    metric: UNIQUE_PORTS
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Reconnaissance
    mitre_technique: T1046
    tags: scan, recon, stealth
    severity: MEDIUM
    confidence: MEDIUM
    action: ALERT
    description: >
      Single source contacting 30+ unique privileged ports on external
      hosts within 60 seconds. Consistent with slow reconnaissance
      tooling designed to evade per-second threshold detection.

  - name: DNSpam
    version: 1
    protocol: UDP
    direction: OUTBOUND
    src_ip: "*"
    dst_ip: "@external"
    dst_port: "53"
    window_sec: 60
    threshold: 15
    metric: UNIQUE_FQDNs
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Command and Control
    mitre_technique: T1071.004
    tags: dns, command_and_control, malware
    severity: MEDIUM
    confidence: HIGH
    action: ALERT
    description: >
      Single source contacting 15+ unique FQDNs over UDP port 53 within 60 seconds.
      Indicates potential DNS beaconing or data exfiltration.

  - name: RDP_ANOMALY
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@internal"
    dst_port: "3389"
    window_sec: 60
    threshold: 5
    metric: UNIQUE_SRC_IPS
    group_by: DST_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Initial Access
    mitre_technique: T1133
    tags: rdp, brute_force, external_access
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      Multiple distinct external IPs attempting RDP connections to the same internal host
      within 60 seconds. Indicates targeted brute-force or exploitation attempts.

  - name: PING_SWEEP
    version: 1
    protocol: ICMP
    direction: OUTBOUND
    src_ip: "*"
    dst_ip: "@internal"
    dst_port: "*"
    window_sec: 10
    threshold: 20
    metric: UNIQUE_DST_IPS
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Reconnaissance
    mitre_technique: T1046
    tags: icmp, recon, network_mapping
    severity: MEDIUM
    confidence: MEDIUM
    action: ALERT
    description: >
      Single source ICMP Echo Requests to 20+ unique internal hosts within 10 seconds.
      Common pattern for network discovery and host enumeration.

  - name: EXE_FROM_JAVA
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@internal"
    dst_port: "54979"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: DST_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Persistence
    mitre_technique: T1547.001
    tags: java, persistent_mechanism, suspicious
    severity: HIGH
    confidence: MEDIUM
    action: ALERT_AND_BLOCK
    description: >
      Inbound connection to dynamic port 54979 from external IP, typical for Java remote code execution.
      Malware often uses this vector to establish persistence.

  - name: P2P_FILE_SHARING_PORTS
    version: 1
    protocol: TCP
    direction: OUTBOUND
    src_ip: "*"
    dst_ip: "@external"
    dst_port: "6881:6889"
    window_sec: 60
    threshold: 5
    metric: COUNT
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Command and Control
    mitre_technique: T1071
    tags: p2p, bittorrent, file_sharing
    severity: LOW
    confidence: LOW
    action: ALERT
    description: >
      Outbound connections to P2P file-sharing ports (6881-6889). 
      While not always malicious, these are frequently used by malware for command and control.
  
  - name: TOR_NODE_COMM
    version: 1
    protocol: TCP
    direction: OUTBOUND
    src_ip: "*"
    dst_ip: "@external"
    dst_port: "9001"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: SRC_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Command and Control
    mitre_technique: T1090
    tags: tor, anonymity, suspicious
    severity: HIGH
    confidence: HIGH
    action: ALERT
    description: >
      Outbound connection to TCP port 9001, commonly used by Tor clients for directory information.
      While not inherently malicious, it may indicate attempts to bypass security controls.

  - name: TELNET_ACCESS
    version: 1
    protocol: TCP
    direction: INBOUND
    src_ip: "@external"
    dst_ip: "@internal"
    dst_port: "23"
    window_sec: 60
    threshold: 1
    metric: COUNT
    group_by: DST_IP
    decay: LINEAR
    baseline_mode: STATIC
    mitre_tactic: Initial Access
    mitre_technique: T1021.004
