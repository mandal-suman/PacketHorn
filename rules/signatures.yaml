signatures:
  - name: SMB_LATERAL_PROBE
    version: 1
    protocol: TCP
    direction: LATERAL
    src_ip: "@internal"
    src_port: "*"
    dst_ip: "@internal"
    dst_port: "445"
    flag_match: "0x02"
    flag_mask: "0xFF"
    payload_pattern: ""
    count: 1
    window_sec: 0
    threshold_mode: PER_SRC
    mitre_tactic: Lateral Movement
    mitre_technique: T1021.002
    tags: smb, lateral, ransomware
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      Single SYN to SMB port between internal hosts. Known vector
      for WannaCry lateral propagation and SMB relay attacks.
  
  - name: SMB_NEGOTIATE_POISON
    version: 1
    protocol: TCP
    direction: LATERAL
    src_ip: "@internal"
    src_port: "*"
    dst_ip: "@internal"
    dst_port: "445"
    flag_match: "0x12"  # SYN-ACK
    flag_mask: "0xFF"
    payload_pattern: "SMB|00|"  # SMB header, length 00
    payload_pattern_type: HEX
    count: 1
    window_sec: 0
    threshold_mode: PER_SRC
    mitre_tactic: Credential Access
    mitre_technique: T1558.003
    tags: smb, relay, credential_theft, ntlmv2
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      SYN-ACK response on port 445 with SMB header, but zero-length payload. 
      Indicators of SMB relay/poisoning attempts targeting NTLMv2 authentication.
      Note: This is a heuristic and may require tuning to reduce false positives.

  - name: SMB_NEGOTIATE_NO_DIALECT
    version: 1
    protocol: TCP
    direction: LATERAL
    src_ip: "@internal"
    src_port: "*"
    dst_ip: "@internal"
    dst_port: "445"
    flag_match: "0x12"  # SYN-ACK
    flag_mask: "0xFF"
    payload_pattern: "534D4243"
    payload_pattern_type: HEX
    count: 1
    window_sec: 0
    threshold_mode: PER_SRC
    mitre_tactic: Credential Access
    mitre_technique: T1558.003
    tags: smb, relay, credential_theft
    severity: MEDIUM
    confidence: MEDIUM
    action: ALERT
    description: >
      SYN-ACK on port 445 with SMB header but no dialect negotiation. 
      Some SMB relay tools send incomplete responses.

  - name: ETERNALBLUE_CHECK
    version: 1
    protocol: UDP
    direction: LATERAL
    src_ip: "@internal"
    src_port: "445"
    dst_ip: "@internal"
    dst_port: "137"
    payload_pattern: "1801"
    payload_pattern_type: HEX
    count: 1
    window_sec: 0
    threshold_mode: PER_SRC
    mitre_tactic: Initial Access
    mitre_technique: T1190
    tags: eternalblue, exploit, ransomware
    severity: HIGH
    confidence: HIGH
    action: ALERT_AND_BLOCK
    description: >
      UDP port 137 packets with '1801' hex prefix. 
      Likely indicates scanning for EternalBlue vulnerability (MS17-010).

